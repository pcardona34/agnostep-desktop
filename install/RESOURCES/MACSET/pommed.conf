# /etc/pommed.conf - for MacBookPro6,2 (2010) with ALSA softvol "Master"

user = root

# keyboard backlight sysfs path
keyboard_backlight = /sys/class/leds/smc::kbd_backlight

# Use the ALSA softvol control named "Master"
volume_control = "Master"

# Map common Mac media/brightness keys to XF86 events
keymap {
  224 = "XF86AudioPlay"
  225 = "XF86AudioPrev"
  226 = "XF86AudioNext"
  228 = "XF86AudioMute"
  229 = "XF86AudioLowerVolume"
  230 = "XF86AudioRaiseVolume"
  232 = "XF86MonBrightnessDown"
  233 = "XF86MonBrightnessUp"
}

# Do not use ambient light sensor
use_als = false

# Poll interval in seconds (0.2 is responsive)
interval = 0.2

